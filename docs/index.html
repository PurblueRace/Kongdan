<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>패턴 영어 - 오늘의 학습</title>
    <meta name="description" content="원어민이 자주 쓰는 영어 패턴을 하루 40개씩 학습하세요">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 16px 20px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
        }

        .nav-item {
            padding: 12px 24px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.2s;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
        }

        .nav-item.active {
            background: rgba(99, 102, 241, 0.2);
            color: #a5b4fc;
        }

        .day-selector {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 0 16px;
            margin-bottom: 16px;
            scrollbar-width: none;
        }

        .day-selector::-webkit-scrollbar {
            display: none;
        }

        .day-btn {
            padding: 10px 18px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .day-btn:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .day-btn.active {
            background: rgba(99, 102, 241, 0.2);
            border-color: rgba(99, 102, 241, 0.3);
            color: #a5b4fc;
        }

        .day-btn.locked {
            opacity: 0.5;
            cursor: not-allowed;
            background: rgba(100, 100, 100, 0.1);
        }

        .day-btn.cleared {
            border-color: rgba(16, 185, 129, 0.4);
            color: #34d399;
        }

        .day-cleared-badge {
            text-align: center;
            padding: 12px 20px;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 12px;
            color: #34d399;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .toast-message {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
            white-space: nowrap;
        }

        .toast-message.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .footer {
            margin-bottom: 80px;
        }
    </style>
</head>

<body>
    <div class="container">
        <header class="header">
            <span class="header-emoji">📚</span>
            <h1>오늘의 패턴 영어</h1>
            <p class="header-subtitle">원어민이 자주 쓰는 필수 패턴을 마스터하세요</p>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar" style="width: 0%"></div>
            </div>
            <div class="progress-text">
                <span>오늘의 진행률</span>
                <span class="progress-count"><span id="completedCount">0</span> / <span id="totalCount">40</span></span>
            </div>
        </header>
        <div class="day-selector" id="daySelector"></div>
        <main class="patterns-grid" id="patternsGrid">
            <div class="loading">
                <div class="loading-spinner"></div><span>패턴 불러오는 중...</span>
            </div>
        </main>
        <footer class="footer">매일 40개씩, 꾸준히 학습하면 영어가 들립니다 ✨</footer>
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item active">📚 학습</a>
            <a href="quiz.html" class="nav-item">📝 시험</a>
            <a href="review.html" class="nav-item">🔄 복습</a>
        </nav>
    </div>
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
